title: gpcx.cc
description: "ride stories & garage experiments"
baseurl: ""
url: "https://gpcx.cc"
lang: en
image: /assets/images/recon_header.jpg
logo: /assets/images/recon_header.jpg
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

show_drafts: true

minima:
  show_excerpts: true
  skin: classic

# Navigation pages
header_pages:
  - stories.md
  - film-roll.md
  - digest.md
  - origin.md

# Site author — hash form so jekyll-seo-tag does not generate an invalid twitter:creator handle from the name
author:
  name: "Kenny Gorman"
  url: "https://gpcx.cc/origin_story/"

# Person schema enrichment
social:
  name: "Kenny Gorman"
  links:
    - https://www.instagram.com/gpcx.cc/
    - https://gpcx.substack.com/

# Twitter card type — no handle since the site has no Twitter presence
twitter:
  card: summary_large_image

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Kenny Gorman"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

robots:
  sitemap: true
  disallow:
    - /drafts/
